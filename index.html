<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бронирование Столов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #00ff88;
            --text-main: #ffffff;
            --text-hint: #888888;
            --danger: #ff4d4d;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-hint);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Календарь */
        .calendar-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-name {
            font-size: 18px;
            font-weight: 700;
            text-transform: capitalize;
            color: var(--accent-color);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .weekday {
            font-size: 12px;
            color: var(--text-hint);
            text-align: center;
            padding-bottom: 10px;
            font-weight: 600;
        }

        .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .day:not(.empty):not(.disabled):hover {
            background: #2a2a2a;
        }

        .day.today {
            color: var(--accent-color);
            font-weight: bold;
        }

        .day.selected {
            background: var(--accent-color) !important;
            color: #000 !important;
            font-weight: 800;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .day.disabled {
            color: #333;
            pointer-events: none;
        }

        /* Кнопки */
        .btn-secondary {
            background: transparent;
            border: 1px solid #333;
            color: var(--text-hint);
            padding: 12px;
            border-radius: 15px;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-secondary:active {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .footer {
            margin-top: auto;
            padding: 10px 0;
        }

        #book-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #book-btn:active {
            transform: scale(0.98);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Reserve</h1>
        <p>Выберите удобную дату</p>
    </div>

    <div id="current-month-container"></div>
    
    <button id="toggle-next" class="btn-secondary">Следующий месяц ↓</button>
    
    <div id="next-month-container" class="hidden"></div>

    <div class="footer">
        <button id="book-btn">Забронировать стол</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0f0f0f';
        tg.headerColor = '#0f0f0f';

        let selectedDate = null;
        const webhookUrl = 'ВАШ_WEBHOOK_URL';

        function init() {
            const now = new Date();
            renderMonth(now, 'current-month-container', true);
            
            document.getElementById('toggle-next').onclick = function() {
                const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                renderMonth(nextMonth, 'next-month-container', false);
                this.classList.add('hidden');
                document.getElementById('next-month-container').classList.remove('hidden');
            };
        }

        function renderMonth(date, containerId, isCurrent) {
            const container = document.getElementById(containerId);
            const year = date.getFullYear();
            const month = date.getMonth();
            const monthName = date.toLocaleString('ru-RU', { month: 'long' });
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = (new Date(year, month, 1).getDay() + 6) % 7;
            const today = new Date().getDate();

            let html = `
                <div class="calendar-card">
                    <div class="month-header">
                        <span class="month-name">${monthName} ${year}</span>
                    </div>
                    <div class="calendar-grid">
                        <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
                        <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
            `;

            for (let i = 0; i < firstDayIndex; i++) {
                html += `<div class="day empty"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const fullDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                let classes = ['day'];
                
                if (isCurrent && d < today) classes.push('disabled');
                if (isCurrent && d === today) classes.push('today');

                html += `<div class="${classes.join(' ')}" onclick="selectDate(this, '${fullDate}')">${d}</div>`;
            }

            html += `</div></div>`;
            container.innerHTML = html;
        }

        window.selectDate = function(el, date) {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            selectedDate = date;
            tg.HapticFeedback.selectionChanged();
        }

        document.getElementById('book-btn').onclick = async () => {
            if (!selectedDate) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showPopup({ message: "Выберите дату перед бронированием" });
                return;
            }

            const payload = {
                user: tg.initDataUnsafe?.user,
                date: selectedDate
            };

            tg.MainButton.showProgress();
            
            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                tg.HapticFeedback.notificationOccurred('success');
                tg.close();
            } catch (e) {
                tg.sendData(JSON.stringify(payload));
            }
        };

        init();
    </script>
</body>
</html>
