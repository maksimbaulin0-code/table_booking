<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование столиков</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #fff;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #fff;
            --tg-theme-text-color: #000;
            --tg-theme-hint-color: #999;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .calendar-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .month-name {
            font-weight: 600;
            text-transform: capitalize;
            color: var(--tg-theme-button-color);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day-name {
            font-size: 0.8em;
            color: var(--tg-theme-hint-color);
            padding-bottom: 5px;
        }

        .day {
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .day:hover { background-color: rgba(0,0,0,0.05); }
        .day.selected {
            background-color: var(--tg-theme-button-color) !important;
            color: var(--tg-theme-button-text-color);
        }
        .day.disabled {
            color: var(--tg-theme-hint-color);
            opacity: 0.4;
            pointer-events: none;
        }
        .day.today { border: 1px solid var(--tg-theme-button-color); }

        .booking-footer {
            position: sticky;
            bottom: 0;
            background: var(--tg-theme-bg-color);
            padding: 10px 0;
        }

        #main-button {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="section-title">Выберите дату</div>
    <div id="calendars" class="calendar-container"></div>

    <div class="booking-footer">
        <button id="main-button">Забронировать</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedDate = null;
        const webhookUrl = 'ВАШ_URL_WEBHOOK_ЗДЕСЬ'; // Замените на URL от n8n или другого сервиса

        function generateCalendar() {
            const container = document.getElementById('calendars');
            const now = new Date();

            for (let i = 0; i < 2; i++) {
                const monthDate = new Date(now.getFullYear(), now.getMonth() + i, 1);
                renderMonth(monthDate, container, i === 0);
            }
        }

        function renderMonth(date, container, isCurrentMonth) {
            const monthWrapper = document.createElement('div');
            const monthName = date.toLocaleString('ru-RU', { month: 'long', year: 'numeric' });

            monthWrapper.innerHTML = `
                <div class="month-name">${monthName}</div>
                <div class="calendar-grid">
                    <div class="day-name">Пн</div><div class="day-name">Вт</div><div class="day-name">Ср</div>
                    <div class="day-name">Чт</div><div class="day-name">Пт</div><div class="day-name">Сб</div><div class="day-name">Вс</div>
                </div>
            `;

            const grid = monthWrapper.querySelector('.calendar-grid');
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDayIndex = (new Date(date.getFullYear(), date.getMonth(), 1).getDay() + 6) % 7;
            const today = new Date().getDate();

            // Пустые ячейки для начала месяца
            for (let x = 0; x < firstDayIndex; x++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.classList.add('day');
                dayEl.innerText = d;

                const fullDate = new Date(date.getFullYear(), date.getMonth(), d).toISOString().split('T')[0];

                if (isCurrentMonth && d < today) {
                    dayEl.classList.add('disabled');
                } else {
                    if (isCurrentMonth && d === today) dayEl.classList.add('today');
                    dayEl.onclick = () => selectDay(dayEl, fullDate);
                }
                grid.appendChild(dayEl);
            }
            container.appendChild(monthWrapper);
        }

        function selectDay(element, date) {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedDate = date;
        }

        document.getElementById('main-button').onclick = async () => {
            if (!selectedDate) {
                tg.showAlert("Пожалуйста, выберите дату!");
                return;
            }

            const data = {
                user: tg.initDataUnsafe?.user,
                date: selectedDate,
                timestamp: new Date().getTime()
            };

            // 1. Отправка через Webhook (внешний сервис)
            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) {
                console.error("Webhook failed", e);
            }

            // 2. Отправка данных обратно боту (закроет Mini App)
            tg.sendData(JSON.stringify(data));
        };

        generateCalendar();
    </script>
</body>
</html>
