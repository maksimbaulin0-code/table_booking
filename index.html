<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>table_booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --accent-color: #00ff88;
            --text-main: #ffffff;
            --text-hint: #555555;
            --border-color: #222222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Название заведения */
        .brand {
            padding: 30px 0 20px 0;
            text-align: center;
        }

        .brand h1 {
            font-family: 'Courier New', Courier, monospace; /* Технологичный стиль */
            font-size: 22px;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .sub-header {
            color: var(--text-hint);
            font-size: 12px;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Календарь */
        .calendar-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .month-name {
            font-size: 16px;
            font-weight: 600;
            text-transform: capitalize;
            margin-bottom: 15px;
            padding-left: 5px;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .weekday {
            font-size: 11px;
            color: var(--text-hint);
            text-align: center;
            font-weight: bold;
        }

        .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .day.today {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .day.selected {
            background: var(--accent-color) !important;
            color: #000 !important;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .day.disabled {
            color: #222;
            pointer-events: none;
        }

        /* Кнопка "Еще" */
        .more-btn {
            background: none;
            border: 1px dashed var(--text-hint);
            color: var(--text-hint);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            cursor: pointer;
            font-size: 13px;
        }

        .more-btn:active {
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .footer {
            margin-top: auto;
            padding: 20px 0;
            position: sticky;
            bottom: 0;
            background: linear-gradient(transparent, var(--bg-color) 20%);
        }

        #main-action-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="brand">
        <h1>table_booking</h1>
    </div>
    <div class="sub-header">Reservation System</div>

    <div id="calendar-flow" class="calendar-section">
        <div id="month-0"></div>
    </div>
    
    <button id="load-next" class="more-btn">+ Показать следующий месяц</button>

    <div class="footer">
        <button id="main-action-btn">ПОДТВЕРДИТЬ БРОНЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let selectedDate = null;
        const webhookUrl = 'ВАШ_URL';

        function renderCalendar(dateOffset) {
            const now = new Date();
            const targetDate = new Date(now.getFullYear(), now.getMonth() + dateOffset, 1);
            const container = document.getElementById(dateOffset === 0 ? 'month-0' : 'calendar-flow');

            const monthName = targetDate.toLocaleString('ru-RU', { month: 'long', year: 'numeric' });
            const daysInMonth = new Date(targetDate.getFullYear(), targetDate.getMonth() + 1, 0).getDate();
            const firstDay = (new Date(targetDate.getFullYear(), targetDate.getMonth(), 1).getDay() + 6) % 7;
            const today = now.getDate();

            const monthBox = document.createElement('div');
            monthBox.innerHTML = `
                <div class="month-name">${monthName}</div>
                <div class="calendar-grid" id="grid-${dateOffset}">
                    <div class="weekday">ПН</div><div class="weekday">ВТ</div><div class="weekday">СР</div>
                    <div class="weekday">ЧТ</div><div class="weekday">ПТ</div><div class="weekday">СБ</div><div class="weekday">ВС</div>
                </div>
            `;

            const grid = monthBox.querySelector('.calendar-grid');

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.classList.add('day');
                dayEl.innerText = d;

                const fullDate = `${targetDate.getFullYear()}-${String(targetDate.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                if (dateOffset === 0 && d < today) {
                    dayEl.classList.add('disabled');
                } else {
                    if (dateOffset === 0 && d === today) dayEl.classList.add('today');
                    dayEl.onclick = () => {
                        document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                        dayEl.classList.add('selected');
                        selectedDate = fullDate;
                        tg.HapticFeedback.impactOccurred('medium');
                    };
                }
                grid.appendChild(dayEl);
            }

            container.appendChild(monthBox);
        }

        document.getElementById('load-next').onclick = function() {
            renderCalendar(1);
            this.style.display = 'none';
        };

        document.getElementById('main-action-btn').onclick = async () => {
            if (!selectedDate) {
                tg.showAlert("Выберите дату бронирования");
                return;
            }

            const data = {
                user: tg.initDataUnsafe?.user,
                booking_date: selectedDate,
                source: 'table_booking_app'
            };

            // Отправка вебхука
            try {
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            } catch(e) {}

            tg.sendData(JSON.stringify(data));
        };

        // Инициализация первого месяца
        renderCalendar(0);
    </script>
</body>
</html>
