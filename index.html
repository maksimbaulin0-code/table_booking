<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>table_booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --accent-color: #00ff88;
            --text-main: #ffffff;
            --text-hint: #666666;
            --border-color: #222222;
            --input-bg: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0 20px 40px 20px;
        }

        .brand { padding: 30px 0 10px 0; text-align: center; }
        .brand h1 {
            font-family: 'Courier New', Courier, monospace;
            font-size: 22px;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        .calendar-section { display: flex; flex-direction: column; gap: 20px; }
        .month-name {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-hint);
            margin: 10px 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .day.selected {
            background: var(--accent-color) !important;
            color: #000 !important;
            font-weight: bold;
        }

        .day.disabled { color: #222; pointer-events: none; }

        /* Блок деталей (скрыт по умолчанию) */
        #details-section {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .detail-label {
            font-size: 12px;
            color: var(--text-hint);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        /* Выбор времени */
        .time-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .time-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 0;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
        }

        .time-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Гости */
        .guests-picker {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 15px;
            width: fit-content;
            margin-bottom: 25px;
        }

        .count-btn {
            background: var(--accent-color);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 18px;
        }

        /* Пожелания */
        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
        }

        .footer { margin-top: 40px; }
        #main-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
        }

        .more-btn {
            background: none;
            border: 1px dashed var(--border-color);
            color: var(--text-hint);
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="brand"><h1>table_booking</h1></div>

    <div id="calendar-flow" class="calendar-section">
        <div id="month-0"></div>
    </div>
    
    <button id="load-next" class="more-btn">Следующий месяц</button>

    <div id="details-section">
        <span class="detail-label">Выберите время</span>
        <div class="time-slots" id="time-container"></div>

        <span class="detail-label">Количество гостей</span>
        <div class="guests-picker">
            <button class="count-btn" onclick="changeGuests(-1)">-</button>
            <span id="guest-count" style="font-weight: bold; min-width: 20px; text-align: center;">2</span>
            <button class="count-btn" onclick="changeGuests(1)">+</button>
        </div>

        <span class="detail-label">Особые пожелания</span>
        <textarea id="comment" rows="3" placeholder="Напр.: столик у окна, аллергия на орехи..."></textarea>
        
        <div class="footer">
            <button id="main-btn">ЗАБРОНИРОВАТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let bookingData = {
            date: null,
            time: null,
            guests: 2,
            comment: ""
        };

        const times = ["12:00", "14:00", "16:00", "18:00", "19:00", "20:00", "21:00", "22:00"];

        function renderCalendar(offset) {
            const now = new Date();
            const date = new Date(now.getFullYear(), now.getMonth() + offset, 1);
            const container = document.getElementById(offset === 0 ? 'month-0' : 'calendar-flow');
            
            const monthHeader = document.createElement('div');
            monthHeader.className = 'month-name';
            monthHeader.innerText = date.toLocaleString('ru-RU', { month: 'long', year: 'numeric' });
            
            const grid = document.createElement('div');
            grid.className = 'calendar-grid';
            
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDay = (new Date(date.getFullYear(), date.getMonth(), 1).getDay() + 6) % 7;

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d<=daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = d;
                const fullDate = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                if(offset === 0 && d < now.getDate()) {
                    dayEl.className += ' disabled';
                } else {
                    dayEl.onclick = () => {
                        document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                        dayEl.classList.add('selected');
                        bookingData.date = fullDate;
                        showDetails();
                        tg.HapticFeedback.impactOccurred('light');
                    };
                }
                grid.appendChild(dayEl);
            }
            container.appendChild(monthHeader);
            container.appendChild(grid);
        }

        function showDetails() {
            document.getElementById('details-section').style.display = 'block';
            const timeContainer = document.getElementById('time-container');
            timeContainer.innerHTML = '';
            
            times.forEach(t => {
                const btn = document.createElement('div');
                btn.className = 'time-btn';
                btn.innerText = t;
                btn.onclick = () => {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    bookingData.time = t;
                    tg.HapticFeedback.selectionChanged();
                };
                timeContainer.appendChild(btn);
            });
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function changeGuests(val) {
            bookingData.guests = Math.max(1, Math.min(10, bookingData.guests + val));
            document.getElementById('guest-count').innerText = bookingData.guests;
            tg.HapticFeedback.impactOccurred('light');
        }

        document.getElementById('load-next').onclick = function() {
            renderCalendar(1);
            this.style.display = 'none';
        };

        document.getElementById('main-btn').onclick = async () => {
            bookingData.comment = document.getElementById('comment').value;
            
            if(!bookingData.date || !bookingData.time) {
                tg.showAlert("Выберите дату и время!");
                return;
            }

            const payload = {
                user: tg.initDataUnsafe?.user,
                ...bookingData
            };

            // Отправка Webhook
            try {
                await fetch('ВАШ_URL_WEBHOOK', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            } catch(e) {}

            tg.sendData(JSON.stringify(payload));
        };

        renderCalendar(0);
    </script>
</body>
</html>
